<!DOCTYPE html>
<html lang="en">
  <head>
   <meta charset="utf-8">
   <meta content="viewport" width="width=device-width, initial-scale=1.0">
   <title>Results Summary Component</title>
   <link rel="stylesheet" href="styles.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <div class="card-container">
        <div class="card-upper">
          <p class="regular-font lavender-text">Your Result</p>
          <div class="score-results-round white-text">
            <p class="large-font white-text bold">76</p>
            <p class="regular-font lavender-text">of 100</p>
          </div>
          <p class="medium-font white-text bold">Great</p>
          <p class="regular-font lavender-text double-line">You scored higher than 65% of the people who have taken these tests.</p>
        </div>
        <div class="card-lower">
          <p class="regular-font black-text css-table-head">Summary</p>          
         <div class="table">    
           
          <div class="row red-bg">          
           <div class="regular-font">
               <img src="icon-reaction.svg">
             <p class="red-text bold left-align">Reaction</p>
           </div>
            <div>
             <p class="black-text">
               <span class="bold gap">80</span> / 100
             </p>
            </div>
           </div>
        

          <div class="row yellow-bg">
            <div class="regular-font">
              <img src="icon-memory.svg">
             <p class="yellow-text bold left-align">Memory</p>
             <p class="black-text">
               <span class="bold gap">92</span> / 100
             </p>   
            </div>
          </div>
        
          <div class="row green-bg">
           <div class="regular-font">
              <img src="icon-verbal.svg">
             <p class="green-text bold left-align">Verbal</p>
             <p class="black-text">
               <span class="bold gap">61</span> / 100
             </p>
           </div>
          </div>

          <div class="row cobalt-bg">           
           <div class="regular-font">
               <img src="icon-visual.svg">
             <p class="cobalt-text bold left-align">Visual</p>
             <p class="black-text">
               <span class="bold gap">73</span> / 100
             </p>
           </div>
          </div>
           
         </div>
        <button class="regular-font white-text">Continue</button>
        </div>
      </div>
    </main>
  </body>
