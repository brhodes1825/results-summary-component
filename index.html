<!DOCTYPE html>
<html lang="en">
  <head>
   <meta charset="utf-8">
   <meta content="viewport" width="width=device-width, initial-scale=1.0">
   <title>Results Summary Component</title>
   <link rel="stylesheet" href="styles2.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
     <div class="card">
      <div class="card-container">
        <div class="card-results">
          <p class="title">Your Result</p>
          <div class="round">
            <p class="result">76</p>
            <p>of 100</p>
          </div>
          <p class="bold">Great</p>
          <p class="info">You scored higher than 65% of the people who have taken these tests.</p>
        </div>
        
        <div class="card-summary">
         <p class="summary">Summary</p>
         <div class="rows">
          <div class="row">          
           <div class="badge">
            <img src="icon-reaction.svg"><p>Reaction</p>
           </div>
            <div class="numeric-value">
             <p><span class="bold">80</span> / 100</p>
            </div>
           </div>

           <div class="row">          
           <div class="badge">
            <img src="icon-memory.svg"><p>Memory</p>
           </div>
            <div class="numeric-value">
             <p><span class="bold">92</span> / 100</p>
            </div>
           </div>

           <div class="row">          
           <div class="badge">
            <img src="icon-verbal.svg"><p>Verbal</p>
           </div>
            <div class="numeric-value">
             <p><span class="bold">61</span> / 100</p>
            </div>
           </div>

           <div class="row">          
           <div class="badge">
            <img src="icon-visual.svg"><p>Visual</p>
           </div>
            <div class="numeric-value">
             <p><span class="bold">73</span> / 100</p>
            </div>
           </div>
           
         </div>
        <button class="regular-font white-text">Continue</button>
        </div>
      </div>
     </div>
    </main>
  </body>
