<!DOCTYPE html>
<html lang="en">
  <head>
   <meta charset="utf-8">
   <meta content="viewport" width="width=device-width, initial-scale=1.0">
   <title>Results Summary Component</title>
   <link rel="stylesheet" href="styles.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <div class="card-container">
        <div class="card-upper">
          <p class="regular-font white-text">Your Result</p>
          <div class="score-results-round white-text">
            <p class="large-font white-text">76</p>
            <p class="regular-font white-text">of 100</p>
          </div>
          <p class="medium-font white-text">Great</p>
          <p class="regular-font white-text">You scored higher that 65% of the people who have taken these tests.</p>
        </div>
        <div class="card-lower">
          <p class="regular-font black-text">Summary</p>
          <div class="results1">
            <img class="result-icon" src="icon-reaction.svg">
            <p class="regular-font red-text">Reaction</p>
          </div>
          <div class="results2"></div>
          <div class="results3"></div>
          <div class="results4"></div>
        </div>
      </div>
    </main>
  </body>
