<!DOCTYPE html>
<html lang="en">
  <head>
   <meta charset="utf-8">
   <meta content="viewport" width="width=device-width, initial-scale=1.0">
   <title>Results Summary Component</title>
   <link rel="stylesheet" href="styles.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <div class="card-container">
        <div class="card-upper">
          <p class="regular-font white-text">Your Result</p>
          <div class="score-results-round white-text">
            <p class="large-font white-text bold">76</p>
            <p class="regular-font white-text">of 100</p>
          </div>
          <p class="medium-font white-text bold">Great</p>
          <p class="regular-font white-text double-line">You scored higher than 65% of the people who have taken these tests.</p>
        </div>
        <div class="card-lower">
         <table>
           <th class="regular-font black-text">Summary</th>
           <tr class="regular-font red-background">
             <td>
               <img src="icon-reaction.svg">
             </td>
             <td class="red-text bold">
               Reaction
             </td>
             <td>
               <span class="bold">80</span> / 100
             </td>
           </tr>
           <tr class="regular-font yellow-background">
             <td>
              <img src="icon-memory.svg">
             </td>
             <td class="yellow-text bold">
               Memory
             </td>
             <td>
               <span class="bold">92</span> / 100
             </td>             
           </tr>
           <tr class="regular-font green-background">
             <td>
              <img src="icon-verbal.svg">
             </td>
             <td class="green-text bold">
               Verbal
             </td>
             <td>
               <span class="bold">61</span> / 100
             </td>
           </tr>
           <tr class="regular-font cobalt-background">
             <td>
               <img src="icon-visual.svg">
             </td>
             <td class="cobalt-text bold">
               Visual
             </td>
             <td>
               <span class="bold">73</span> / 100
             </td>
           </tr>
         </table>
        <button class="regular-font white-text">Continue</button>
        </div>
      </div>
    </main>
  </body>
